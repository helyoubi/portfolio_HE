name: Portfolio CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate HTML & JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install HTML Tidy
        run: sudo apt-get update && sudo apt-get install -y tidy

      - name: Validate every HTML page
        run: |
          for f in index.html projects.html trainings.html howto.html veille.html; do
            echo "::group::Tidy $f"
            tidy -qe "$f" || true
            echo "::endgroup::"
          done

      - name: Validate JSON files
        run: |
          for f in data/portfolioData.json manifest.json; do
            echo "Parsing $f ..."
            node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))"
          done

  test:
    name: Jest tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
